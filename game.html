<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ギャルが応援してくれる！ばくれつカブトムシ！</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body {
            background-color: #1a1a2e;
            color: #fff;
            text-align: center;
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 10px 0 40px 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: manipulation;
        }
        h1 { margin: 0 0 5px 0; font-size: 18px; color: #ff007f; text-shadow: 0 0 10px rgba(255,0,127,0.3); }
        p { margin: 0 0 8px 0; color: #ccc; font-size: 10px; }
        
        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 0 auto;
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        canvas#gameCanvas {
            background-color: #0f0f1a;
            border: 4px solid #3498db;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
            display: block;
            width: 92%;
            max-width: 440px;
            height: auto;
            aspect-ratio: 1 / 1;
        }

        .controller-area {
            display: flex;
            flex-direction: column;
            width: 92%;
            max-width: 440px;
            margin: 5px 0;
            gap: 8px;
            box-sizing: border-box;
        }
        .action-pads {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .move-pads {
            display: flex;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border: 2px solid #fff;
            border-radius: 12px;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px #1a252f;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px #1a252f;
            background: linear-gradient(135deg, #34495e, #2c3e50);
        }
        .btn-move { flex: 1; }
        .btn-shoot {
            background: linear-gradient(135deg, #ff007f, #ff5e62);
            border: 2px solid #ff007f;
            box-shadow: 0 4px #b30059;
            width: 110px;
            font-size: 18px;
            padding: 13px 0;
        }
        .btn-shoot:active {
            box-shadow: 0 2px #b30059;
            background: linear-gradient(135deg, #ff5e62, #ff007f);
        }

        /* 📊 リアルタイムネオンゲージボタン */
        .btn-summon {
            background-color: #222233;
            background-image: linear-gradient(to right, #222233 0%, #222233 100%);
            border: 2px solid #555566;
            color: #aab;
            box-shadow: none;
            padding: 11px 0;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
            cursor: not-allowed;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            transition: border 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        
        .btn-summon.active {
            border: 2px solid #00ffff;
            color: #ffffff;
            box-shadow: 0 4px #005580, 0 0 10px rgba(0, 255, 255, 0.2);
            cursor: pointer;
        }
        .btn-summon.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px #005580;
        }

        .sidebar {
            width: 92%;
            max-width: 440px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 6px;
        }

        .gal-area {
            background-color: #0f0f1a;
            border: 3px solid #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
            height: 110px;
            flex: 1;
            min-width: 130px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            background-image: url('gal.png'); /* スマホ用ピンクゆるふわギャル画像 */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center top;
        }

        .gal-bubble {
            position: absolute;
            bottom: 6px;
            left: 5%;
            width: 90%;
            background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid #ff007f;
            border-radius: 6px;
            color: #111122;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 0;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        canvas#galCanvas { display: none; }

        .status-area {
            background-color: #0f0f1a;
            border: 3px solid #fff;
            height: 110px;
            flex: 1;
            min-width: 130px;
            border-radius: 8px;
            padding: 6px 10px;
            text-align: left;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .ranking-area {
            background-color: #0f0f1a;
            border: 3px solid #00ffff;
            width: 100%; 
            height: 120px;
            border-radius: 8px;
            padding: 6px 12px;
            text-align: left;
            box-sizing: border-box;
            font-size: 11px;
            margin-top: 2px;
        }

        .ranking-title {
            color: #00ffff;
            font-weight: bold;
            text-align: center;
            margin-bottom: 4px;
            font-size: 12px;
            border-bottom: 1px dashed #00ffff;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
            line-height: 1.4;
        }

        .status-item { font-size: 13px; font-weight: bold; }
        #score { color: #fff; }
        #level { color: #00ffff; }
        #life { color: #ff2a6d; }
        #chain { color: #fffb00; font-style: italic; min-height: 14px; font-size: 11px; }
        
        /* 💻 PC大画面用の完璧な復活設定 */
        @media (min-width: 768px) {
            body { overflow-y: hidden; padding: 20px 0; }
            .main-container { flex-direction: row; max-width: 760px; }
            
            /* スマホ専用の移動・発射ボタンだけを隠す（召喚ボタンは隠さない） */
            .action-pads { display: none; } 
            
            .sidebar { width: 240px; flex-direction: column; }
            
            canvas#galCanvas { display: block; width: 100%; height: 100%; }
            .gal-area { height: 180px; background-image: none; }
            .gal-bubble { display: none; }

            .status-area { height: 130px; }
            .ranking-area { height: 145px; }
            canvas#gameCanvas { width: 100%; max-width: 480px; }
        }
    </style>
</head>
<body>

    <h1>ギャル応援！ばくれつカブトムシ！</h1>
    <p>【操作】スマホ：画面下ボタン ／ PC：左右矢印・スペース・【Cキー】でアイテム召喚</p>

    <div class="main-container">
        <canvas id="gameCanvas" width="480" height="480"></canvas>

        <div class="controller-area">
            <div class="btn btn-summon" id="btnSummon">🎁 NEXT ITEM GAUGE (0%)</div>
            <div class="action-pads">
                <div class="move-pads">
                    <div class="btn btn-move" id="btnLeft">◀ 左移動</div>
                    <div class="btn btn-move" id="btnRight">右移動 ▶</div>
                </div>
                <div class="btn btn-shoot" id="btnShoot">💥 弾発射</div>
            </div>
        </div>

        <div class="sidebar">
            <div class="gal-area">
                <canvas id="galCanvas" width="240" height="180"></canvas>
                <div class="gal-bubble" id="galSpeech">レッツばくれつ！</div>
            </div>
            
            <div class="status-area">
                <div class="status-item">SCORE: <span id="score">0</span></div>
                <div class="status-item">LEVEL: <span id="level">1</span></div>
                <div class="status-item">LIFE: <span id="life">♥♥♥</span></div>
                <div class="status-item" id="chain"></div>
            </div>

            <div class="ranking-area">
                <div class="ranking-title">🏆 世界オンラインTOP5 🏆</div>
                <div id="rankingList">ロード中...</div>
            </div>
        </div>
    </div>

<script>
try {
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    const galCanvas = document.getElementById("galCanvas");
    const galCtx = galCanvas.getContext("2d");
    const galSpeech = document.getElementById("galSpeech");
    const btnSummon = document.getElementById("btnSummon");

    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const lifeEl = document.getElementById("life");
    const chainEl = document.getElementById("chain");
    const rankingListEl = document.getElementById("rankingList");

    const GAS_URL = "https://script.google.com/macros/s/AKfycbwGW5pZ-TJwa_mGdcculSma2tf4F05N1tJ9tVI1hk5Trpce1Qy8AAfylbue6n1mmKA5/exec";

    // --- サウンド生成システム ---
    let audioCtx = null;
    function playSound(type, comboCount = 1) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'shoot') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
                gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'hit') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'combo') {
                osc.type = 'sine'; const baseFreq = 300 + (comboCount * 80);
                osc.frequency.setValueAtTime(baseFreq, now); osc.frequency.setValueAtTime(baseFreq * 1.5, now + 0.05);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'damage') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(10, now + 0.3);
                gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'star' || type === 'bomb_get') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.08); osc.frequency.setValueAtTime(783.99, now + 0.16);
                osc.frequency.setValueAtTime(1046.50, now + 0.24); gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4); osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'bonus') {
                osc.type = 'square'; osc.frequency.setValueAtTime(880, now);
                osc.frequency.setValueAtTime(1760, now + 0.06); gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2); osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'heal') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, now);
                osc.frequency.setValueAtTime(880.00, now + 0.08); gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.25); osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'bomb_exec') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(30, now + 0.6); gain.gain.setValueAtTime(0.6, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.6); osc.start(now); osc.stop(now + 0.6);
            }
        } catch (e) {}
    }

    function resumeAudio() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        } catch(e){}
    }
    window.addEventListener('click', resumeAudio);
    window.addEventListener('keydown', resumeAudio);
    window.addEventListener('touchstart', resumeAudio);

    let player, bullets, shells, fragments, score, combo, comboTimer, items, scoreEffects;
    let lives = 3;
    let isGameOver = false;
    let currentLevel = 1;
    let spawnTimer = 0;
    let isSubmitting = false;
    
    let moveLeft = false;
    let moveRight = false;
    let shootPressed = false;
    let autoShootTimer = 0;

    let totalChainCount = 0;
    let nextSummonChain = 50;
    let summonStocks = 0;
    let cutInTimer = 0;
    let flashTimer = 0;

    let gal = { x: 120, y: 135, jumpY: 0, jumpSpeed: 0, text: "レッツばくれつ！", textTimer: 120 };

    const LEVEL_TABLE = [
        { maxScore: 5000,    spawnRate: 60, speedMin: 0.5, speedMax: 1.5 },
        { maxScore: 30000,   spawnRate: 52, speedMin: 0.7, speedMax: 1.8 },
        { maxScore: 100000,  spawnRate: 45, speedMin: 0.9, speedMax: 2.1 },
        { maxScore: 300000,  spawnRate: 38, speedMin: 1.2, speedMax: 2.4 },
        { maxScore: 500000,  spawnRate: 32, speedMin: 1.5, speedMax: 2.8 },
        { maxScore: 1000000, spawnRate: 26, speedMin: 1.8, speedMax: 3.2 },
        { maxScore: 2000000, spawnRate: 20, speedMin: 2.2, speedMax: 3.6 },
        { maxScore: 3500000, spawnRate: 16, speedMin: 2.6, speedMax: 4.2 },
        { maxScore: 5000000, spawnRate: 13, speedMin: 3.0, speedMax: 4.8 },
        { maxScore: Infinity,spawnRate: 10, speedMin: 3.5, speedMax: 5.5 }
    ];

    const GAMEOVER_GAL_TALK = [
        { minScore: 0,        text: "画面見てた？さすがにオワコンw" },
        { minScore: 293,      text: "ねえ嘘でしょ？雑魚すぎw" },
        { minScore: 1001,     text: "あーね、つぎ頑張ろ！" },
        { minScore: 10000,    text: "まあまあじゃん？やる〜" },
        { minScore: 50000,    text: "お、結構粘ったね！ウケる" },
        { minScore: 100000,   text: "普通に凄くない？やるやん" },
        { minScore: 300000,   text: "ヤバ！うちより上手いかも" },
        { minScore: 600000,   text: "ガチ勢じゃん！神ってる！" },
        { minScore: 1000000,  text: "ミリオン達成とかマジリプ！" },
        { minScore: 2000000,  text: "えっ、２ミリオン？天才すぎっ" },
        { minScore: 3000000,  text: "もはやプロやん、尊い…！" },
        { minScore: 5000000,  text: "異次元すぎ！愛してるー！" },
        { minScore: 7500000,  text: "全一狙えるレベルっしょこれ！" },
        { minScore: 10000000, text: "大台突破！まじで神の領域！" },
        { minScore: 15000000, text: "脳汁枯れるわ！伝説の目撃者w" },
        { minScore: 20000000, text: "2千万とか覇王！結婚してッ！" }
    ];

    function loadRanking() {
        try {
            if(!GAS_URL || GAS_URL.includes("ここに")) { rankingListEl.innerText = "ローカル稼働中"; return; }
            fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                rankingListEl.innerHTML = "";
                if(!data || data.length === 0) { rankingListEl.innerText = "ランキングはまだ空です"; return; }
                data.forEach((item, index) => {
                    let div = document.createElement("div"); div.className = "ranking-item";
                    div.innerHTML = `<span>${index + 1}位: ${item.name}</span><span>${item.score.toLocaleString()}点</span>`;
                    rankingListEl.appendChild(div);
                });
            })
            .catch(e => { rankingListEl.innerText = "オフライン稼働中"; });
        } catch(e) { rankingListEl.innerText = "オフライン稼働中"; }
    }

    function sendScore(playerName) {
        try {
            if(!GAS_URL || isSubmitting) return;
            isSubmitting = true;
            fetch(GAS_URL, {
                method: "POST", mode: "no-cors", 
                body: JSON.stringify({ name: playerName, score: score }),
                headers: { "Content-Type": "text/plain" }
            })
            .then(() => { setTimeout(() => { isSubmitting = false; loadRanking(); }, 1500); })
            .catch(err => { isSubmitting = false; loadRanking(); });
        } catch(e) { isSubmitting = false; }
    }

    // 💻 PC大画面時にサイドバーの適切な位置へゲージを挿入する安全な関数
    function layoutSummonButtonForPC() {
        const sidebar = document.querySelector('.sidebar');
        const galArea = document.querySelector('.gal-area');
        if (window.innerWidth >= 768 && sidebar && galArea) {
            galArea.parentNode.insertBefore(btnSummon, galArea.nextSibling);
        } else {
            const controllerArea = document.querySelector('.controller-area');
            if (controllerArea) {
                controllerArea.insertBefore(btnSummon, controllerArea.firstChild);
            }
        }
    }

    function initGame() {
        player = { x: 223, y: 440, width: 34, height: 24, speed: 5, cooldown: false, invincible: 0, starTime: 0 };
        bullets = []; shells = []; fragments = []; items = []; scoreEffects = [];
        score = 0; combo = 0; comboTimer = 0; lives = 3; isGameOver = false; currentLevel = 1; spawnTimer = 0;
        moveLeft = false; moveRight = false; shootPressed = false;
        totalChainCount = 0; nextSummonChain = 50; summonStocks = 0; cutInTimer = 0; flashTimer = 0;
        gal.text = "レッツばくれつ！"; gal.textTimer = 120; gal.jumpY = 0; gal.jumpSpeed = 0;
        galSpeech.innerText = gal.text;
        
        layoutSummonButtonForPC();
        updateSummonButton();
        loadRanking();
    }

    function triggerSummon() {
        if (summonStocks <= 0 || isGameOver || cutInTimer > 0) return;
        summonStocks--;
        updateSummonButton();
        
        const types = ['star', 'heal', 'bomb'];
        const chosenType = types[Math.floor(Math.random() * types.length)];
        items.push({ x: Math.random() * (canvas.width - 40) + 20, y: -20, vy: 1.5, radius: 12, type: chosenType });
        
        gal.text = "アイテム来い来いッ！"; gal.textTimer = 90; gal.jumpSpeed = -4;
        galSpeech.innerText = gal.text;
    }

    function updateSummonButton() {
        let base = nextSummonChain === 50 ? 0 : nextSummonChain - 100;
        let currentProgress = totalChainCount - base;
        let required = nextSummonChain === 50 ? 50 : 100;
        
        let percent = summonStocks >= 2 ? 100 : Math.min(100, Math.max(0
